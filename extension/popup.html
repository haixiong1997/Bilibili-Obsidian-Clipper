<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilibili Clipper</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="top">
        <strong>B站字幕</strong>
        <button id="settingsBtn" type="button" class="ghost">设置</button>
      </header>

      <p id="status" class="status">准备就绪</p>

      <div class="section-title">属性</div>
      <section class="props">
        <div class="prop-row"><span class="k">title</span><span id="propTitle" class="v"></span></div>
        <div class="prop-row"><span class="k">url</span><span id="propUrl" class="v"></span></div>
        <div class="prop-row"><span class="k">created</span><span id="propCreated" class="v"></span></div>
        <div class="prop-row"><span class="k">tags</span><span id="propTags" class="v"></span></div>
      </section>

      <label class="label" for="subtitleSelect">字幕语言</label>
      <select id="subtitleSelect"></select>

      <label class="label" for="noteFolderSelect">保存目录</label>
      <select id="noteFolderSelect"></select>

      <section id="collectionSection" class="collection hidden">
        <div class="section-title">合集导入</div>
        <div class="collection-head">
          <div id="collectionTitle" class="collection-title"></div>
          <div class="collection-shortcuts">
            <button id="selectAllBtn" type="button" class="ghost small">全选</button>
            <button id="selectCurrentBtn" type="button" class="ghost small">仅当前</button>
            <button id="clearSelectionBtn" type="button" class="ghost small">清空</button>
          </div>
        </div>
        <div id="collectionList" class="collection-list"></div>
        <button id="batchImportBtn" type="button" class="batch">批量导入到 Obsidian</button>
      </section>

      <label class="label" for="preview">字幕预览</label>
      <textarea id="preview" readonly wrap="off"></textarea>

      <div class="actions">
        <button id="refreshBtn" type="button">刷新</button>
        <button id="copyBtn" type="button">复制</button>
        <button id="downloadBtn" type="button">下载</button>
      </div>
      <button id="sendBtn" type="button" class="send">保存到 Obsidian</button>
      <p id="message" class="message"></p>
      <div id="batchResultWrap" class="batch-result-wrap hidden">
        <div id="batchResult" class="batch-result"></div>
        <button id="batchRetryBtn" type="button" class="ghost hidden">仅重试失败项</button>
      </div>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
